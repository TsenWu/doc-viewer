<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Final Recovery Test</title>

    <link rel="stylesheet" href="./css/flipbook.min.css" />
    <script src="./js/flipbook.min.js"></script>

    <style>
        /* 1. 強制背景為黑色，如果頁面是白的，一眼就能看出是誰在擋 */
        body, html { margin: 0; padding: 0; background-color: #000 !important; }
        #container { width: 100%; height: 100vh; background-color: #000 !important; }

        /* 2. 暴力破解：移除原廠 CSS 裡所有的白底 */
        .flipbook-wrapper, 
        .flipbook-page3, 
        .flipbook-page-html,
        .flipbook-page-content,
        .flipbook-main-wrapper {
            background: transparent !important;
            background-color: transparent !important;
            box-shadow: none !important;
        }

        /* 3. 強制畫布顯示：這是圖像所在層 */
        .flipbook-page-canvas, canvas {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            z-index: 5 !important;
            background-color: #ffffff !important; /* 只有這裡允許是白的 */
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 這是最安全的初始化方式
            new FlipBook(document.getElementById('container'), {
                pdfUrl: './2023_GW_Greenhouse_Gas_Inventory_Report.pdf', 
                pdfWorkerSrc: './js/libs/pdf.worker.min.js',
                
                // --- 徹底禁用所有可能導致崩潰的伺服器檢查 ---
                checkUrl: 'javascript:void(0)', // 強制阻斷 check.php 請求
                disableCheck: true,
                
                // --- 使用最穩定的渲染路徑 ---
                viewMode: 'swipe',     // 先用最簡單的滑動模式，排除 3D 運算錯誤
                renderType: 'canvas', 
                textLayer: true,       // 保留您要的文字功能
                
                // --- 其他必要設定 ---
                cMapUrl: './assets/cmaps/',
                cMapPacked: true,
                webgl: false           // 暫時關閉 WebGL，排除顯示卡相容性
            });
        });
    </script>
</head>
<body>
    <div id="container"></div>
</body>
</html>
