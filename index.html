<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoldenWay 型錄最終解決方案</title>

    <link rel="stylesheet" href="./css/flipbook.min.css" />
    <script src="./js/flipbook.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; background-color: #333; height: 100%; overflow: hidden; }
        #container { width: 100%; height: 100vh; background-color: #333; }
        .flipbook-page-canvas, canvas {
            display: block !important;
            visibility: visible !important;
            background-color: #ffffff !important;
        }
    </style>
</head>

<body>
    <div id="container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            new FlipBook(document.getElementById('container'), {
                // 指向您的報告檔案
                pdfUrl: './2023_GW_Greenhouse_Gas_Inventory_Report.pdf', 
                
                // 強制使用穩定的 2.16.105 版本引擎
                pdfWorkerSrc: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js',
                
                // --- 核心修正：強制關閉自定義字體，解決 TT: undefined function 問題 ---
                disableFontFace: true, 
                
                // 徹底無視 PHP 請求
                checkUrl: 'ignore', 
                disableCheck: true,
                
                // 穩定性設定
                viewMode: 'swipe',
                renderType: 'canvas',
                textLayer: true,
                webgl: false,
                
                // 字體對應檔雲端路徑
                cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/cmaps/',
                cMapPacked: true
            });
        });
    </script>
</body>
</html>
