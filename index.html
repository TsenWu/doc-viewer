<!doctype html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="stylesheet" href="./css/flipbook.min.css" />
        
        <script src="./js/flipbook.min.js"></script>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('container');
    new FlipBook(el, {
    pdfUrl: 'https://raw.githubusercontent.com/mozilla/pdf.js/ba2edeae/web/compressed.tracemonkey-pldi-09.pdf',
    pdfWorkerSrc: './js/libs/pdf.worker.min.js',
    
    // --- 診斷測試：暫時關閉文字層 ---
    // 如果關閉後圖片出現了，就代表是文字層變成了白牆蓋住了圖片
    textLayer: false, 
    
    // --- 換一種顯示模式試試看 ---
    // 'css' 模式通常比 'canvas' 更穩定，雖然效能稍低但相容性最強
    renderType: 'css', 
    
    // 確保關閉 PHP 驗證
    checkUrl: '', 
    
    // 解決層級問題
    webgl: false,
    viewMode: 'swipe' // 換成最基礎的滑動模式測試渲染
});
});
        </script>
        
        <style>
            body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #333; }
            #container { width: 100%; height: 100vh; }
            /* 強制讓文字層背景透明，確保下方的畫布能透出來 */
.flipbook-textLayer {
    background-color: transparent !important;
}

/* 確保畫布（Canvas）不會被隱藏 */
.flipbook-page-canvas {
    display: block !important;
    visibility: visible !important;
    opacity: 1 !important;
}

/* 避免 GitHub Pages 的某些預設背景干擾 */
#container {
    background-color: #333 !important; /* 換成深色背景更容易看出白色頁面在哪 */
}
        </style>
    </head>

    <body>
        <div id="container"></div>
    </body>
</html>
