<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>GoldenWay 互動型錄 - 終極穩定版</title>
    <link rel="stylesheet" href="./css/flipbook.min.css" />
    <script src="./js/flipbook.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background-color: #333; height: 100%; overflow: hidden; }
        #container { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="container"></div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 自動生成 18 頁圖片路徑
            const pageCount = 18;
            const pagesArray = [];
            for (let i = 1; i <= pageCount; i++) {
                
                // --- 核心修正：將數字格式化為 2 位數零補全（例如 1 -> 01） ---
                const paddedNumber = i.toString().padStart(2, '0'); 

                pagesArray.push({
                    src: `./pages/page_${paddedNumber}.jpg`, // 此處會變為 page_01.jpg
                    thumb: `./pages/page_${paddedNumber}.jpg`,
                    title: `第 ${i} 頁` // 這裡顯示 第 1 頁，不需零補全
                });
            }

            new FlipBook(document.getElementById('container'), {
                pages: pagesArray,          // 改用圖片陣列模式，避開 PDF 渲染錯誤
                viewMode: 'webgl',         // 恢復 3D 翻頁效果
                checkUrl: 'ignore',        
                disableCheck: true,
                singlePageMode: false,     // 雙頁模式
                btnSearch: { enabled: false }, 
                btnDownloadPdf: { enabled: true, url: './2023_GW_Greenhouse_Gas_Inventory_Report.pdf' }
            });
        });
    </script>
</body>
</html>
