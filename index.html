<!doctype html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="stylesheet" href="./css/flipbook.min.css" />
        
        <script src="./js/flipbook.min.js"></script>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('container');
    new FlipBook(el, {
    pdfUrl: 'https://raw.githubusercontent.com/mozilla/pdf.js/ba2edeae/web/compressed.tracemonkey-pldi-09.pdf',
    pdfWorkerSrc: './js/libs/pdf.worker.min.js',
    
    // --- 關鍵穩定性設定 ---
    viewMode: 'webgl',         // 如果 webgl 還是白屏，請改試 'swipe'
    singlePageMode: false,     // 確保雙頁模式正常啟動
    
    // --- 徹底切斷伺服器依賴 (防止 check.php 干擾) ---
    deepLinking: false,        // 暫時關閉網址頁碼同步，排除干擾
    webgl: true,
    
    // --- 渲染優化 ---
    cMapUrl: './assets/cmaps/',
    cMapPacked: true,
    renderType: 'canvas'       // 強制畫布渲染，這對圖像版 PDF 最友善
});
});
        </script>
        
        <style>
            body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #333; }
            #container { width: 100%; height: 100vh; }
        </style>
    </head>

    <body>
        <div id="container"></div>
    </body>
</html>
